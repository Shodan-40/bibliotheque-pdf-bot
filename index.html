<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bibliothèque PDF Pro</title>
    <!-- Chargement des bibliothèques via CDN -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .index-text { font-size: 0.85rem; line-height: 1.6; color: #334155; }
        .code-box { background: #f1f5f9; border-radius: 12px; padding: 12px; margin: 12px 0; border: 1px solid #e2e8f0; }
        .code-line { display: flex; gap: 8px; font-size: 0.75rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .code-tag { font-family: monospace; color: #2563eb; background: white; padding: 1px 6px; border-radius: 4px; border: 1px solid #d1d5db; min-width: 65px; text-align: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Composant d'icône Lucide sécurisé
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    try {
                        spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                    } catch (e) { console.error(e); }
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [path, setPath] = useState([]);
            const [showIndex, setShowIndex] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [files, setFiles] = useState([]);
            const [botUsername, setBotUsername] = useState('');
            const [loading, setLoading] = useState(true);
            const [apiStatus, setApiStatus] = useState('checking'); 
            const [showAdmin, setShowAdmin] = useState(false);
            const [stats, setStats] = useState(null);
            
            const API_URL = "https://bibliotheque-pdf-bot.onrender.com";

            const tg = window.Telegram?.WebApp;
            const ADMIN_IDS = ["7966491400"];
            const currentUserId = tg?.initDataUnsafe?.user?.id?.toString() || null;
            const isAdmin = currentUserId && ADMIN_IDS.includes(currentUserId);

            const fetchFiles = async () => {
                setLoading(true);
                setApiStatus('checking');
                try {
                    const res = await fetch(`${API_URL}/api/files`);
                    const data = await res.json();
                    const list = Array.isArray(data.files) ? data.files : Array.isArray(data) ? data : [];
                    setFiles(list.filter(f => f && f.title));
                    if (data.botUsername) setBotUsername(data.botUsername);
                    setApiStatus('online');
                } catch (err) {
                    setApiStatus('offline');
                } finally {
                    setLoading(false);
                }
            };

            const fetchStats = async () => {
                if (!isAdmin) return;
                try {
                    const res = await fetch(`${API_URL}/api/stats`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ adminId: currentUserId })
                    });
                    const data = await res.json();
                    setStats(data);
                } catch (err) { console.error(err); }
            };

            useEffect(() => {
                if (tg) { tg.ready(); tg.expand(); }
                fetchFiles();
            }, []);

            useEffect(() => {
                if (showAdmin) fetchStats();
            }, [showAdmin]);

            const folderContent = useMemo(() => {
                const q = searchQuery.toLowerCase().trim();
                if (q) return { folders: [], filesList: files.filter(f => String(f.title).toLowerCase().includes(q)).sort((a,b) => a.title.localeCompare(b.title)) };
                
                const keys = ['category', 'subCat', 'subSubCat'];
                const matchingFiles = files.filter(f => {
                    for (let i = 0; i < path.length; i++) {
                        if (String(f[keys[i]]).toUpperCase() !== String(path[i]).toUpperCase()) return false;
                    }
                    return true;
                });
                
                const nextKey = keys[path.length];
                if (!nextKey) return { folders: [], filesList: matchingFiles.sort((a,b) => a.title.localeCompare(b.title)) };
                
                const uniqueFolders = [...new Set(matchingFiles.map(f => f[nextKey]).filter(Boolean))].sort();
                const filesList = matchingFiles.filter(f => !f[nextKey]).sort((a,b) => a.title.localeCompare(b.title));
                
                return { folders: uniqueFolders, filesList };
            }, [files, path, searchQuery]);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col relative overflow-hidden">
                    {/* Header */}
                    <header className="sticky top-0 bg-white/95 border-b px-4 py-4 z-20 shadow-sm">
                        <div className="flex items-center gap-3 mb-4">
                            {(path.length > 0 || searchQuery || showIndex) ? (
                                <button onClick={() => { if(searchQuery)setSearchQuery(''); else if(showIndex)setShowIndex(false); else setPath(path.slice(0,-1)); }} className="p-2 bg-slate-100 rounded-full"><Icon name="arrow-left" size={20}/></button>
                            ) : isAdmin ? (
                                <button onClick={() => setShowAdmin(true)} className="p-2 text-slate-400 active:scale-90 transition-all"><Icon name="settings" size={22}/></button>
                            ) : <div className="w-10"></div>}
                            <h1 onClick={() => { setPath([]); setShowIndex(false); setSearchQuery(''); }} className="text-xl font-black flex-1 text-center truncate uppercase italic tracking-tight cursor-pointer">Bibliothèque</h1>
                            <button onClick={fetchFiles} className={`p-2 rounded-full ${loading ? 'animate-spin text-blue-600' : 'text-slate-400'}`}><Icon name="refresh-cw" size={20}/></button>
                        </div>
                        {!showIndex && (
                            <div className="relative">
                                <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Rechercher par titre..." className="w-full bg-slate-100 rounded-2xl py-3 pl-10 pr-4 outline-none text-sm focus:ring-2 focus:ring-blue-500/20" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        )}
                    </header>

                    <div className={`px-4 py-1.5 text-[10px] flex items-center justify-between font-black uppercase tracking-widest ${apiStatus === 'online' ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'}`}>
                        <div className="flex items-center gap-1.5"><Icon name={apiStatus === 'online' ? 'check-circle' : 'wifi-off'} size={12} />{apiStatus === 'online' ? 'Serveur Connecté' : 'Hors Ligne'}</div>
                        <span className="opacity-50">CLOUD RENDER</span>
                    </div>

                    <main className="p-4 pb-28 flex-1 overflow-y-auto no-scrollbar">
                        {showIndex ? (
                            <div className="space-y-8 animate-in">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 italic text-[11px] leading-relaxed">
                                    <h2 className="text-blue-600 font-black uppercase tracking-widest mb-3">Légende des Codes</h2>
                                    <p><strong>[FR]</strong> : Français | <strong>[ANG]</strong> : Anglais | <strong>[TRAD]</strong> : Traduction.</p>
                                    <p className="mt-2 opacity-60">Utilisez la recherche pour croiser les versions d'un même document.</p>
                                </div>
                                <div className="space-y-3">
                                    {files.sort((a,b) => a.title.localeCompare(b.title)).map(file => (
                                        <FileCard key={file.id} file={file} bot={botUsername} tg={tg} />
                                    ))}
                                </div>
                            </div>
                        ) : loading && files.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-24 text-slate-400">
                                <div className="w-10 h-10 border-4 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                                <p className="text-[10px] font-black uppercase tracking-widest">Récupération des données...</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {folderContent.folders.map(folder => (
                                    <button key={folder} onClick={() => setPath([...path, folder])} className="w-full bg-white p-6 rounded-[2rem] text-left shadow-lg border border-slate-100 flex items-center gap-4 active:scale-95 transition-all">
                                        <div className="text-3xl">📂</div>
                                        <span className="font-black text-[10px] uppercase text-slate-700">{folder}</span>
                                    </button>
                                ))}
                                {folderContent.filesList.map(file => (
                                    <FileCard key={file.id} file={file} bot={botUsername} tg={tg} />
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Navigation flottante */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40">
                        <button onClick={() => setShowIndex(!showIndex)} className={`px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 active:scale-95 transition-all ${showIndex ? 'bg-rose-600 shadow-rose-200' : 'bg-slate-900 shadow-slate-300'} text-white`}>
                            <Icon name={showIndex ? 'arrow-left' : 'book-open'} size={20} />
                            <span className="font-black text-[10px] uppercase tracking-widest">{showIndex ? 'Quitter Index' : 'Index Global'}</span>
                        </button>
                    </div>

                    {/* Modal Admin / Statistiques PARFAITE */}
                    {showAdmin && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-6 shadow-2xl max-h-[85vh] overflow-y-auto no-scrollbar animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black uppercase italic tracking-tighter">Tableau de Bord Admin</h2>
                                    <button onClick={() => setShowAdmin(false)} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={20}/></button>
                                </div>
                                {stats ? (
                                    <div className="space-y-8 pb-6">
                                        {/* SECTION STATS */}
                                        <div className="grid grid-cols-2 gap-3">
                                            <StatCard label="Total" val={stats.total} col="blue" />
                                            <StatCard label="Aujourd'hui" val={stats.today} col="emerald" />
                                            <StatCard label="Semaine" val={stats.week} col="amber" />
                                            <StatCard label="Mois" val={stats.month} col="purple" />
                                            <div className="col-span-2"><StatCard label="Année" val={stats.year} col="rose" /></div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-2 flex items-center gap-2"><Icon name="trending-up" size={12}/> Top 10 des Lectures</h3>
                                            <div className="bg-slate-50 p-2 rounded-3xl space-y-1 border border-slate-100">
                                                {stats.top10.map((f, i) => (
                                                    <div key={i} className="flex items-center gap-3 p-3 bg-white rounded-2xl shadow-sm">
                                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-black ${i < 3 ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-100 text-slate-400'}`}>{i+1}</div>
                                                        <div className="flex-1 truncate text-[10px] font-bold text-slate-700">{f.title}</div>
                                                        <div className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">↓ {f.downloads}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-20 text-center flex flex-col items-center gap-4">
                                        <div className="w-10 h-10 border-4 border-t-blue-600 rounded-full animate-spin"></div>
                                        <p className="text-[10px] font-black uppercase text-slate-400">Génération des stats...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const StatCard = ({ label, val, col }) => {
            const colors = {
                blue: "bg-blue-50 border-blue-100 text-blue-600 shadow-blue-100",
                emerald: "bg-emerald-50 border-emerald-100 text-emerald-600 shadow-emerald-100",
                amber: "bg-amber-50 border-amber-100 text-amber-600 shadow-amber-100",
                purple: "bg-purple-50 border-purple-100 text-purple-600 shadow-purple-100",
                rose: "bg-rose-50 border-rose-100 text-rose-600 shadow-rose-100"
            };
            return (
                <div className={`${colors[col]} p-5 rounded-3xl border shadow-md transition-transform active:scale-95`}>
                    <div className="text-[9px] font-black uppercase mb-1 opacity-80">{label}</div>
                    <div className="text-3xl font-black text-slate-900">{val || 0}</div>
                </div>
            );
        };

        const FileCard = ({ file, bot, tg }) => {
            const titleStr = String(file.title || '').replace(/_/g, ' ');
            let emoji = "📄";
            if (/\bFR\b/i.test(titleStr)) emoji = '🇫🇷';
            else if (/\bANG\b/i.test(titleStr)) emoji = '🇬🇧';
            else if (/\bITA\b/i.test(titleStr)) emoji = '🇮🇹';
            else if (/\bTRAD\b/i.test(titleStr)) emoji = '📖';

            const download = () => {
                const link = `https://t.me/${bot}?start=dl_${file.id}`;
                if (tg?.openTelegramLink) tg.openTelegramLink(link);
                else window.open(link, '_blank');
            };

            return (
                <div className="bg-white p-5 rounded-[2.5rem] shadow-lg flex items-start gap-4 border border-slate-50 animate-in mb-3">
                    <div className="flex flex-col items-center gap-1.5 mt-1">
                        <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 text-2xl flex-shrink-0">{emoji}</div>
                        <div className="flex items-center gap-1 text-[9px] font-black text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full border border-slate-100 w-full justify-center">
                            <Icon name="download" size={10}/> {file.downloads || 0}
                        </div>
                    </div>
                    <div className="flex-1 min-w-0 pr-2">
                        <h3 className="font-bold text-[11px] text-slate-800 leading-tight mb-3 break-words">{titleStr}</h3>
                        <button onClick={download} className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                            <Icon name="download" size={14} /> Recevoir PDF
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html><!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">

        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    try {
                        spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                    } catch (e) {}
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center' }}></span>;
        };

        const App = () => {
            const [path, setPath] = useState([]);
            const [showIndex, setShowIndex] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [files, setFiles] = useState([]);
            const [botUsername, setBotUsername] = useState('');
            const [loading, setLoading] = useState(true);
            const [status, setStatus] = useState('checking'); 
            const [showAdmin, setShowAdmin] = useState(false);
            const [stats, setStats] = useState(null);
            
            const API_URL = "https://bibliotheque-pdf-bot.onrender.com";
            const ADMIN_IDS = ["7966491400"];
            const tg = window.Telegram?.WebApp;
            const currentUserId = tg?.initDataUnsafe?.user?.id?.toString();
            const isAdmin = currentUserId && ADMIN_IDS.includes(currentUserId);

            const fetchFiles = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/api/files`);
                    const data = await res.json();
                    setFiles(Array.isArray(data.files) ? data.files : data);
                    if (data.botUsername) setBotUsername(data.botUsername);
                    setStatus('online');
                } catch (err) { setStatus('offline'); }
                finally { setLoading(false); }
            };

            const fetchStats = async () => {
                if (!isAdmin) return;
                try {
                    const res = await fetch(`${API_URL}/api/stats`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ adminId: currentUserId })
                    });
                    const data = await res.json();
                    setStats(data);
                } catch (err) {}
            };

            useEffect(() => {
                if (tg) { tg.ready(); tg.expand(); }
                fetchFiles();
            }, []);

            useEffect(() => {
                if (showAdmin) fetchStats();
            }, [showAdmin]);

            const content = useMemo(() => {
                const q = searchQuery.toLowerCase().trim();
                if (q) return { folders: [], items: files.filter(f => f.title.toLowerCase().includes(q)) };
                const keys = ['category', 'subCat'];
                const filtered = files.filter(f => {
                    for (let i = 0; i < path.length; i++) {
                        if (String(f[keys[i]]).toUpperCase() !== String(path[i]).toUpperCase()) return false;
                    }
                    return true;
                });
                const nextKey = keys[path.length];
                const folders = nextKey ? [...new Set(filtered.map(f => f[nextKey]).filter(Boolean))].sort() : [];
                const items = filtered.filter(f => !nextKey || !f[nextKey]).sort((a,b) => a.title.localeCompare(b.title));
                return { folders, items };
            }, [files, path, searchQuery]);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col relative">

                        <div className="flex items-center gap-3">
                            {(path.length > 0 || searchQuery || showIndex) ? (
                                <button onClick={() => { setSearchQuery(''); setShowIndex(false); setPath(path.slice(0,-1)); }} className="p-2 bg-slate-100 rounded-full"><Icon name="arrow-left" size={18}/></button>

                                <button onClick={() => setShowAdmin(true)} className="p-2 text-slate-400 hover:text-blue-600 active:scale-90 transition-all"><Icon name="settings" size={22}/></button>

                            <h1 onClick={() => { setPath([]); setShowIndex(false); setSearchQuery(''); }} className="text-xl font-black italic uppercase tracking-tighter cursor-pointer">Bibliothèque</h1>

                    </header>

                    <main className="p-4 flex-1 pb-28 overflow-y-auto no-scrollbar">
                        {showIndex ? (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 italic text-xs leading-relaxed">
                                    <h2 className="text-blue-600 font-black uppercase tracking-widest mb-3">Note de Consultation</h2>
                                    <p><strong>[FR]</strong> : Français | <strong>[ANG]</strong> : Anglais | <strong>[TRAD]</strong> : Traduction.</p>
                                    <p className="mt-2 opacity-60">Utilisez la recherche pour croiser les versions.</p>
                                </div>
                                <div className="space-y-3">
                                    {files.sort((a,b) => a.title.localeCompare(b.title)).map(f => <FileCard key={f.id} file={f} onDownload={() => tg.openTelegramLink(`https://t.me/${botUsername}?start=dl_${f.id}`)} />)}
                                </div>
                            </div>
                        ) : loading ? (
                            <div className="flex justify-center py-24 text-blue-600 animate-spin"><Icon name="refresh-cw" size={32}/></div>
                        ) : (
                            <div className="space-y-4 animate-in">
                                {content.folders.map(f => (
                                    <button key={f} onClick={() => setPath([...path, f])} className="w-full bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100 flex items-center gap-4 active:scale-95 transition-all text-left">
                                        <span className="text-3xl">📂</span>
                                        <span className="font-black text-[10px] uppercase text-slate-700">{f}</span>
                                    </button>
                                ))}
                                {content.items.map(f => <FileCard key={f.id} file={f} onDownload={() => tg.openTelegramLink(`https://t.me/${botUsername}?start=dl_${f.id}`)} />)}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-30">
                        <button onClick={() => setShowIndex(!showIndex)} className={`px-8 py-4 rounded-full shadow-2xl flex items-center gap-2 font-black text-[10px] uppercase tracking-widest text-white ${showIndex ? 'bg-rose-600 shadow-rose-200' : 'bg-slate-900 shadow-slate-300'}`}>

                    </div>

                    {showAdmin && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end p-4">

                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black uppercase italic tracking-tighter">Tableau de Bord</h2>
                                    <button onClick={() => setShowAdmin(false)} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={20}/></button>
                                </div>
                                {stats ? (
                                    <div className="space-y-8 pb-6">
                                        {/* SECTION STATS PARFAITE */}
                                        <div className="grid grid-cols-2 gap-3">
                                            <StatCard label="Total" val={stats.total} col="blue" />
                                            <StatCard label="Aujourd'hui" val={stats.today} col="emerald" />
                                            <StatCard label="Semaine" val={stats.week} col="amber" />
                                            <StatCard label="Mois" val={stats.month} col="purple" />
                                            <div className="col-span-2"><StatCard label="Année" val={stats.year} col="rose" /></div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-2">⭐ Top 10 des Lectures</h3>
                                            <div className="bg-slate-50 p-2 rounded-3xl space-y-1 border border-slate-100">
                                                {stats.top10.map((f, i) => (
                                                    <div key={i} className="flex items-center gap-3 p-3 bg-white rounded-2xl shadow-sm">
                                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-black ${i < 3 ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</div>
                                                        <div className="flex-1 truncate text-[10px] font-bold text-slate-700">{f.title}</div>
                                                        <div className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">↓ {f.downloads}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-20 text-center flex flex-col items-center gap-4">
                                        <div className="w-10 h-10 border-4 border-t-blue-600 rounded-full animate-spin"></div>
                                        <p className="text-[10px] font-black uppercase text-slate-400">Calcul en cours...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const StatCard = ({ label, val, col }) => {
            const colors = {
                blue: "bg-blue-50 border-blue-100 text-blue-600",
                emerald: "bg-emerald-50 border-emerald-100 text-emerald-600",
                amber: "bg-amber-50 border-amber-100 text-amber-600",
                purple: "bg-purple-50 border-purple-100 text-purple-600",
                rose: "bg-rose-50 border-rose-100 text-rose-600"
            };
            return (
                <div className={`${colors[col]} p-5 rounded-3xl border shadow-sm`}>
                    <div className="text-[9px] font-black uppercase mb-1 opacity-70">{label}</div>
                    <div className="text-3xl font-black text-slate-900">{val || 0}</div>
                </div>
            );
        };

        const FileCard = ({ file, onDownload }) => (
            <div className="bg-white p-5 rounded-[2.5rem] shadow-lg flex items-start gap-4 border border-slate-50 animate-in mb-3">
                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 text-2xl flex-shrink-0">📄</div>
                <div className="flex-1 min-w-0 pr-2">
                    <h3 className="font-bold text-[11px] mb-3 leading-tight break-words">{file.title}</h3>
                    <button onClick={() => onDownload(file)} className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        <Icon name="download" size={14}/> Recevoir PDF
                    </button>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
