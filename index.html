<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bibliothèque PDF V2.5</title>
    <!-- Bibliothèques par CDN -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .code-box { background: #f1f5f9; border-radius: 12px; padding: 12px; margin: 12px 0; border: 1px solid #e2e8f0; }
        .code-line { display: flex; gap: 8px; font-size: 0.75rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .code-tag { font-family: monospace; color: #2563eb; background: white; padding: 1px 6px; border-radius: 4px; border: 1px solid #d1d5db; min-width: 65px; text-align: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    try {
                        spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                    } catch (e) {}
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [path, setPath] = useState([]);
            const [showIndex, setShowIndex] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [files, setFiles] = useState([]);
            const [botUsername, setBotUsername] = useState('');
            const [loading, setLoading] = useState(true);
            const [status, setStatus] = useState('checking'); 
            const [showAdmin, setShowAdmin] = useState(false);
            const [stats, setStats] = useState(null);
            
            const API_URL = "https://bibliotheque-pdf-bot.onrender.com";
            const ADMIN_IDS = ["7966491400"];
            const tg = window.Telegram?.WebApp;
            const currentUserId = tg?.initDataUnsafe?.user?.id?.toString();
            const isAdmin = currentUserId && ADMIN_IDS.includes(currentUserId);

            const fetchFiles = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/api/files`);
                    const data = await res.json();
                    setFiles(Array.isArray(data.files) ? data.files : data);
                    if (data.botUsername) setBotUsername(data.botUsername);
                    setStatus('online');
                } catch (err) { setStatus('offline'); }
                finally { setLoading(false); }
            };

            const fetchStats = async () => {
                if (!isAdmin) return;
                try {
                    const res = await fetch(`${API_URL}/api/stats`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ adminId: currentUserId })
                    });
                    const data = await res.json();
                    setStats(data);
                } catch (err) {}
            };

            const deleteFile = async (id) => {
                if (!confirm("🚨 Supprimer ce document définitivement ?")) return;
                try {
                    const res = await fetch(`${API_URL}/api/delete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ adminId: currentUserId, fileId: id })
                    });
                    if (res.ok) fetchFiles();
                } catch (err) {}
            };

            const deleteFolder = async (category, subCat = null) => {
                const label = subCat ? `le sous-dossier "${subCat}"` : `le dossier "${category}"`;
                if (!confirm(`⚠️ ATTENTION ⚠️\nVoulez-vous supprimer TOUT le contenu de ${label} ?\nCette action est irréversible.`)) return;

                try {
                    const res = await fetch(`${API_URL}/api/delete_folder`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ adminId: currentUserId, category, subCat })
                    });
                    if (res.ok) {
                        setPath([]);
                        fetchFiles();
                    }
                } catch (err) {}
            };

            useEffect(() => {
                if (tg) { tg.ready(); tg.expand(); }
                fetchFiles();
            }, []);

            useEffect(() => { if (showAdmin) fetchStats(); }, [showAdmin]);

            const folderContent = useMemo(() => {
                const q = searchQuery.toLowerCase().trim();
                if (q) return { folders: [], items: files.filter(f => f.title.toLowerCase().includes(q)) };
                const keys = ['category', 'subCat'];
                const filtered = files.filter(f => {
                    for (let i = 0; i < path.length; i++) {
                        if (String(f[keys[i]]).toUpperCase() !== String(path[i]).toUpperCase()) return false;
                    }
                    return true;
                });
                const nextKey = keys[path.length];
                const folders = nextKey ? [...new Set(filtered.map(f => f[nextKey]).filter(Boolean))].sort() : [];
                const items = filtered.filter(f => !nextKey || !f[nextKey]).sort((a,b) => a.title.localeCompare(b.title));
                return { folders, items };
            }, [files, path, searchQuery]);

            const handleDownload = (file) => {
                setFiles(prev => prev.map(f => f.id === file.id ? {...f, downloads: (f.downloads || 0) + 1} : f));
                const link = `https://t.me/${botUsername}?start=dl_${file.id}`;
                if (tg?.openTelegramLink) tg.openTelegramLink(link);
                else window.open(link, '_blank');
            };

            const handleFloatingAction = () => {
                if (showIndex) setShowIndex(false);
                else if (path.length > 0) setPath(path.slice(0, -1));
                else setShowIndex(true);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col relative overflow-hidden">
                    <header className="sticky top-0 bg-white border-b px-4 py-4 z-20 shadow-sm flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            {(path.length > 0 || searchQuery || showIndex) ? (
                                <button onClick={() => { if(searchQuery)setSearchQuery(''); else if(showIndex)setShowIndex(false); else setPath(path.slice(0,-1)); }} className="p-2 bg-slate-100 rounded-full active:scale-90 transition-all"><Icon name="arrow-left" size={20}/></button>
                            ) : isAdmin ? (
                                <button onClick={() => setShowAdmin(true)} className="p-2 text-slate-400 active:scale-90 transition-all"><Icon name="settings" size={22}/></button>
                            ) : <div className="w-10"></div>}
                            <h1 onClick={() => { setPath([]); setShowIndex(false); setSearchQuery(''); }} className="text-xl font-black flex-1 text-center truncate uppercase italic tracking-tight cursor-pointer">Bibliothèque</h1>
                        </div>
                        <div className={`w-3 h-3 rounded-full ${status === 'online' ? 'bg-emerald-500' : 'bg-rose-500 shadow-lg'}`}></div>
                    </header>

                    {!showIndex && !loading && (
                        <div className="px-4 pt-4 animate-in">
                            <div className="relative">
                                <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Rechercher par titre..." className="w-full bg-white border border-slate-200 rounded-2xl py-3 pl-10 pr-4 outline-none text-sm shadow-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </div>
                    )}

                    <main className="p-4 pb-32 flex-1 overflow-y-auto no-scrollbar">
                        {showIndex ? (
                            <div className="space-y-8 animate-in">
                                {/* SECTION PRÉSENTATION INDEX */}
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 italic text-[11px] leading-relaxed">
                                    <h2 className="text-blue-600 font-black uppercase tracking-widest mb-3 text-center">Note d'Utilisation</h2>
                                    <p className="mb-3 text-slate-700 text-center">Voici l'ensemble des documents disponibles. Certains sont en français et d'autres sont des traductions. Vous disposez également des originaux.</p>
                                    
                                    <div className="code-box">
                                        <div className="code-line"><span className="code-tag">[ FR ]</span> Articles Français</div>
                                        <div className="code-line"><span className="code-tag">[ TRAD ]</span> Traductions</div>
                                        <div className="code-line"><span className="code-tag">[ ANG ]</span> Articles Anglais</div>
                                        <div className="code-line"><span className="code-tag">[ ITA ]</span> Articles Italiens</div>
                                    </div>
                                    
                                    <p className="mt-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 text-blue-800 font-black text-center uppercase tracking-tight">
                                        Utilisez la fonction RECHERCHE pour trouver l'original et la traduction d'un même document.
                                    </p>
                                </div>

                                {/* LISTE INDEX ORDONNÉE VERTICALEMENT */}
                                <div className="space-y-2">
                                    {files.sort((a,b) => a.title.localeCompare(b.title)).map(file => (
                                        <div key={file.id} className="bg-white p-5 rounded-[1.8rem] shadow-sm border border-slate-100 flex flex-col gap-1 active:bg-slate-50 transition-all" onClick={() => { setSearchQuery(file.title); setShowIndex(false); }}>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[9px] font-black text-blue-500 uppercase tracking-tighter bg-blue-50 px-2 py-0.5 rounded-full border border-blue-100 flex items-center gap-1">
                                                    <Icon name="folder" size={10} /> {file.category}
                                                </span>
                                            </div>
                                            <span className="text-[11px] font-bold text-slate-800 uppercase tracking-tight">
                                                {String(file.title).replace(/_/g, ' ')}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : loading ? (
                            <div className="flex flex-col items-center justify-center py-24 text-slate-400">
                                <div className="w-10 h-10 border-4 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                                <p className="text-[10px] font-black uppercase tracking-widest">Initialisation...</p>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in">
                                {folderContent.folders.map(folder => (
                                    <div key={folder} className="relative group">
                                        <button onClick={() => setPath([...path, folder])} className="w-full bg-white p-6 rounded-[2rem] text-left shadow-lg border border-slate-100 flex items-center gap-4 active:scale-95 transition-all">
                                            <div className="text-3xl">📂</div>
                                            <span className="font-black text-[10px] uppercase text-slate-700">{folder}</span>
                                        </button>
                                        {isAdmin && (
                                            <button onClick={() => deleteFolder(path[0] || folder, path[0] ? folder : null)} className="absolute top-1/2 -translate-y-1/2 right-4 p-2.5 text-rose-500 bg-rose-50 rounded-xl active:scale-90 transition-all shadow-sm">
                                                <Icon name="trash-2" size={16}/>
                                            </button>
                                        )}
                                    </div>
                                ))}
                                {folderContent.items.map(file => (
                                    <FileCard key={file.id} file={file} onDownload={handleDownload} isAdmin={isAdmin} onDelete={deleteFile} api={API_URL} />
                                ))}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40">
                        <button onClick={handleFloatingAction} className={`px-10 py-4 rounded-full shadow-2xl flex items-center gap-3 active:scale-95 transition-all ${showIndex ? 'bg-rose-600 text-white shadow-rose-200' : path.length > 0 ? 'bg-white border border-slate-200 text-slate-900 shadow-slate-200' : 'bg-slate-900 text-white shadow-slate-400'}`}>
                            <Icon name={showIndex || path.length > 0 ? 'arrow-left' : 'book-open'} size={20} />
                            <span className="font-black text-[10px] uppercase tracking-widest">
                                {showIndex ? 'Fermer' : path.length > 0 ? 'Retour' : 'Index Global'}
                            </span>
                        </button>
                    </div>

                    {showAdmin && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-6 shadow-2xl max-h-[85vh] overflow-y-auto no-scrollbar animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black uppercase italic tracking-tighter text-slate-800">Tableau de Bord</h2>
                                    <button onClick={() => setShowAdmin(false)} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={20}/></button>
                                </div>
                                {stats ? (
                                    <div className="space-y-4 pb-6">
                                        <StatCard label="Total Téléchargements" val={stats.total} col="blue" icon="trending-up" />
                                        <StatCard label="Aujourd'hui" val={stats.today} col="emerald" icon="calendar" />
                                        <StatCard label="Cette Semaine" val={stats.week} col="amber" icon="calendar-days" />
                                        <StatCard label="Ce Mois" val={stats.month} col="purple" icon="layers" />
                                        <StatCard label="Cette Année" val={stats.year} col="rose" icon="bar-chart-3" />
                                        
                                        <div className="pt-6 space-y-4">
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-2 flex items-center gap-2"><Icon name="star" size={12}/> Top 10 Lectures</h3>
                                            <div className="bg-slate-50 p-2 rounded-3xl space-y-1 border border-slate-100">
                                                {stats.top10.map((f, i) => (
                                                    <div key={i} className="flex items-center gap-3 p-3 bg-white rounded-2xl shadow-sm">
                                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-black ${i < 3 ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>{i+1}</div>
                                                        <div className="flex-1 truncate text-[10px] font-bold text-slate-700">{f.title}</div>
                                                        <div className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">↓ {f.downloads}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ) : <div className="py-20 text-center animate-spin text-blue-600 flex justify-center"><Icon name="refresh-cw" size={32}/></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const StatCard = ({ label, val, col, icon }) => {
            const colors = { 
                blue: "bg-blue-50 border-blue-100 text-blue-600", 
                emerald: "bg-emerald-50 border-emerald-100 text-emerald-600", 
                amber: "bg-amber-50 border-amber-100 text-amber-600", 
                purple: "bg-purple-50 border-purple-100 text-purple-600", 
                rose: "bg-rose-50 border-rose-100 text-rose-600" 
            };
            return (
                <div className={`${colors[col]} p-5 rounded-[2rem] border shadow-md flex items-center justify-between transition-all active:scale-95`}>
                    <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center"><Icon name={icon} size={20} /></div>
                        <div>
                            <div className="text-[9px] font-black uppercase opacity-70 tracking-tighter">{label}</div>
                            <div className="text-2xl font-black text-slate-900">{val || 0}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const FileCard = ({ file, onDownload, isAdmin, onDelete, api }) => {
            const titleStr = String(file.title || '').replace(/_/g, ' ');
            
            // Correction système de miniature : on cible précisément les catégories
            const isMagOrBook = file.category === "06 MAGAZINES" || file.category === "07 LIVRES";
            const showThumb = isMagOrBook && file.thumbId;

            return (
                <div className="bg-white p-4 rounded-[2.5rem] shadow-lg flex items-start gap-4 border border-slate-50 animate-in mb-3">
                    <div className="flex flex-col items-center gap-1.5 mt-1">
                        {showThumb ? (
                            <div className="w-16 h-20 bg-slate-100 rounded-xl overflow-hidden border border-slate-200 shadow-inner flex-shrink-0 relative">
                                <img 
                                    src={`${api}/api/thumbnail/${file.thumbId}`} 
                                    className="w-full h-full object-cover" 
                                    alt="Cover" 
                                    loading="lazy"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.parentElement.innerHTML = '<div class="w-full h-full flex items-center justify-center text-blue-500 text-2xl">📄</div>';
                                    }} 
                                />
                            </div>
                        ) : (
                            <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 text-2xl flex-shrink-0">📄</div>
                        )}
                        <div className="flex items-center gap-1 text-[9px] font-black text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full border border-slate-100 w-full justify-center">
                            <Icon name="download" size={10}/> {file.downloads || 0}
                        </div>
                    </div>
                    <div className="flex-1 min-w-0 pr-2 pt-1">
                        <div className="flex justify-between items-start mb-2 gap-2">
                            <h3 className="font-bold text-[11px] text-slate-800 leading-tight uppercase tracking-tight break-words flex-1">{titleStr}</h3>
                            {isAdmin && (
                                <button onClick={() => onDelete(file.id)} className="p-2 text-rose-500 bg-rose-50 rounded-xl active:scale-90 transition-all"><Icon name="trash-2" size={14}/></button>
                            )}
                        </div>
                        <button onClick={() => onDownload(file)} className="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                            <Icon name="download" size={14} /> Recevoir PDF
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
